<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VN VN+ Library</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

body{
font-family:'Be Vietnam Pro',sans-serif;
background:url("https://c10.patreonusercontent.com/4/patreon-media/p/post/150765348/ad9f53cd292849189563a7cdcab6d7ba/eyJ3IjoxMDgwfQ%3D%3D/1.png?token-hash=AUExMqv41paQJ19kzOiW8qHME1xUGCfq6Tv-mJtI4Dw%3D&token-time=1774915200") center/cover fixed no-repeat;
color:white;
}

.cyber{
font-family:'Orbitron',sans-serif;
}

.glass{
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
}

/* ========================= */
/* PRELOADER */
/* ========================= */

#preloader{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader{
font-size:30px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

/* ========================= */
/* PROGRESS BAR */
/* ========================= */

#progress{
position:fixed;
top:0;
left:0;
height:3px;
background:#bc13fe;
width:0%;
z-index:1000;
}

/* ========================= */
/* GAME CARD */
/* ========================= */

.game-card{
transition:0.4s;
transform-style:preserve-3d;
position:relative;
overflow:hidden;
}

.game-card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff00ff;
}

.game-card::before{
content:"";
position:absolute;
top:-100%;
left:-100%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);
transform:rotate(25deg);
transition:0.5s;
}

.game-card:hover::before{
top:0;
left:0;
}

/* ========================= */
/* BADGE */
/* ========================= */

.badge{
animation:beat 1.5s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* ========================= */
/* TOAST */
/* ========================= */

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#111;
padding:12px 20px;
border-radius:8px;
border:1px solid #444;
display:none;
}

/* ========================= */
/* BACK TO TOP */
/* ========================= */

#topBtn{
position:fixed;
bottom:20px;
right:20px;
display:none;
}

/* ========================= */
/* HERO SLIDER */
/* ========================= */

.slide{
display:none;
}

.slide.active{
display:block;
}

/* ========================= */
/* MOBILE MENU */
/* ========================= */

#mobileMenu{
right:-100%;
}

/* ========================= */
/* REVEAL */
/* ========================= */

.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<!-- CANVAS PARTICLES -->

<canvas id="bgCanvas" class="fixed top-0 left-0 z-0"></canvas>

<!-- PRELOADER -->

<div id="preloader">
<div class="loader cyber text-purple-500">
VN VN+ Library
</div>
</div>

<!-- PROGRESS BAR -->

<div id="progress"></div>

<!-- NAVBAR -->

<nav class="glass sticky top-0 z-40">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="cyber text-purple-400 text-xl glitch">
VN VN+ Library
</div>

<div class="hidden md:flex gap-6">
<a href="#">Trang chủ</a>
<a href="#">PC</a>
<a href="#">Mobile</a>
<a href="#">Nhóm dịch</a>
</div>

<div class="flex gap-2 items-center">

<input id="searchInput" placeholder="Tìm game..."
class="bg-black/40 border border-purple-500 rounded-full px-4 py-1 text-sm">

<button onclick="openAuth()" class="text-xs border border-purple-500 px-2 py-1 rounded">
Đăng nhập
</button>

<button onclick="openAuth()" class="border border-purple-500 px-4 py-2 rounded">
Đăng ký
</button>

</div>

<button class="md:hidden text-2xl" onclick="openMenu()">
<i class="fa fa-bars"></i>
</button>

</div>

</nav>

<!-- HERO -->

<section class="max-w-5xl mx-auto mt-10 glass p-6 rounded text-center">

<div id="heroSlider">

<div class="slide active">
<img src="https://c10.patreonusercontent.com/4/patreon-media/p/post/68936209/67dde7ae097148ecafb8b399af1611d9/eyJ3IjoxMDgwfQ%3D%3D/1.png?token-hash=EDQjKSwarAcVJz6BFyuvSVRb5sr9ANhmTeYIfGA6KWg%3D&token-time=1774828800" class="mx-auto rounded">
</div>

<div class="slide">
<img src="https://picsum.photos/900/300?2" class="mx-auto rounded">
</div>

<div class="slide">
<img src="https://picsum.photos/900/300?3" class="mx-auto rounded">
</div>

</div>

</section>

<!-- MAIN LAYOUT -->

<div class="max-w-7xl mx-auto mt-10 grid lg:grid-cols-12 gap-6 px-6">

<!-- FILTER -->

<div class="lg:col-span-3 glass p-4 rounded reveal">

<h2 class="cyber text-purple-400 mb-3">
Bộ lọc
</h2>

<label><input type="checkbox"> Romance</label><br>
<label><input type="checkbox"> Fantasy</label><br>
<label><input type="checkbox"> Mystery</label>

<hr class="my-3">

<label><input type="radio" name="status"> Full</label><br>
<label><input type="radio" name="status"> Đang dịch</label>

<hr class="my-3">

<label><input type="radio" name="rate"> 5★</label><br>
<label><input type="radio" name="rate"> 4★</label>

<button class="mt-3 bg-purple-600 px-3 py-1 rounded">
Reset Filter
</button>

</div>

<!-- GAME GRID -->

<div class="lg:col-span-6 grid grid-cols-2 md:grid-cols-3 gap-4">

<!-- GAME CARD TEMPLATE REPEATED -->

<script>

const games=[
"Học viện tình yêu",
"Bí ẩn học đường",
"Thế giới phép thuật",
"Đêm định mệnh",
"Harem School",
"Mystic Dream",
"Summer Love",
"Dark Night",
"Dream Story",
"Lost Memory",
"Magic Tale",
"Secret Heart"
]

for(let i=0;i<games.length;i++){

document.write(`

<div class="game-card glass rounded overflow-hidden reveal">

<div class="relative">

<img src="https://picsum.photos/300/40${i}" class="w-full">

<span class="badge absolute top-2 left-2 bg-red-600 text-xs px-2 py-1 rounded">
NEW
</span>

<button onclick="bookmark(${i})" class="absolute top-2 right-2 text-white">
<i class="fa fa-heart"></i>
</button>

</div>

<div class="p-2">

<h3 class="cyber text-sm">
${games[i]}
</h3>

<p class="text-xs text-purple-400">
VN Team
</p>

<button onclick="openQuick(${i})" class="mt-2 w-full bg-purple-600 text-xs py-1 rounded">
Quick View
</button>

</div>

</div>

`)

}

</script>

</div>

<!-- SIDEBAR -->

<div class="lg:col-span-3 glass p-4 rounded reveal">

<h2 class="cyber text-purple-400 mb-3">
Bảng xếp hạng nhóm
</h2>

<div class="space-y-3">

<div>
VN Team
<div class="w-full bg-gray-700 h-2 rounded">
<div class="bg-purple-600 h-2 w-4/5"></div>
</div>
</div>

<div>
Night VN
<div class="w-full bg-gray-700 h-2 rounded">
<div class="bg-purple-600 h-2 w-3/5"></div>
</div>
</div>

<div>
Dream VN
<div class="w-full bg-gray-700 h-2 rounded">
<div class="bg-purple-600 h-2 w-2/5"></div>
</div>
</div>

</div>

</div>

</div>

<!-- PAGINATION -->

<div class="text-center mt-10">

<button class="px-3 py-1 border">1</button>
<button class="px-3 py-1 border">2</button>
<button class="px-3 py-1 border">3</button>
<button class="px-3 py-1 border">Next</button>

</div>

<!-- QUICK VIEW MODAL -->

<div id="quickModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">

<div class="glass p-6 rounded w-96 text-center">

<h2 id="quickTitle" class="cyber text-purple-400 mb-3"></h2>

<img id="quickImg" class="mx-auto mb-3">

<p class="text-sm">
Tóm tắt cốt truyện demo Visual Novel.
</p>

<div class="flex justify-center gap-3 mt-3">

<button onclick="copyLink()" class="border px-3 py-1">
Copy Link
</button>

<button class="border px-3 py-1">
Facebook
</button>

<button class="border px-3 py-1">
Twitter
</button>

</div>

<div class="mt-4 text-left">

<h3 class="cyber text-purple-400 text-sm">
Comments
</h3>

<p class="text-xs text-gray-300">
User1: Game rất hay
</p>

<p class="text-xs text-gray-300">
User2: Đang chờ bản cập nhật
</p>

</div>

<button onclick="closeQuick()" class="mt-4 text-red-400">
Đóng
</button>

</div>

</div>

<!-- AUTH MODAL -->

<div id="authModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">

<div class="glass p-6 rounded w-96">

<h2 class="cyber text-purple-400 mb-3">
Đăng nhập
</h2>

<input placeholder="Email" class="w-full mb-3 p-2 bg-black/40 border rounded">

<input placeholder="Password" type="password" class="w-full mb-3 p-2 bg-black/40 border rounded">

<button class="w-full bg-purple-600 py-2 rounded">
Login
</button>

<p class="text-xs mt-2 cursor-pointer">
Chưa có tài khoản? Đăng ký
</p>

</div>

</div>

<!-- TOAST -->

<div id="toast" class="toast">
Saved
</div>

<!-- BACK TO TOP -->

<button id="topBtn" onclick="topPage()" class="bg-purple-600 p-3 rounded">
↑
</button>

<!-- AUDIO -->

<audio id="bgm" loop>
<source src="">
</audio>

<button onclick="toggleAudio()" class="fixed bottom-20 left-5 bg-purple-600 p-3 rounded">
<i class="fa fa-volume-up"></i>
</button>

<script>

/* PRELOADER */

setTimeout(()=>{
document.getElementById("preloader").style.display="none"
},2000)

/* HERO SLIDER */

let slides=document.querySelectorAll(".slide")
let index=0

setInterval(()=>{
slides[index].classList.remove("active")
index=(index+1)%slides.length
slides[index].classList.add("active")
},4000)

/* SCROLL PROGRESS */

window.onscroll=function(){

let winScroll=document.body.scrollTop||document.documentElement.scrollTop
let height=document.documentElement.scrollHeight-document.documentElement.clientHeight
let scrolled=(winScroll/height)*100

document.getElementById("progress").style.width=scrolled+"%"

if(winScroll>300){
topBtn.style.display="block"
}else{
topBtn.style.display="none"
}

}

/* BACK TO TOP */

function topPage(){
window.scrollTo({top:0,behavior:"smooth"})
}

/* BOOKMARK */

function bookmark(id){

let list=JSON.parse(localStorage.getItem("fav")||"[]")

if(!list.includes(id))list.push(id)

localStorage.setItem("fav",JSON.stringify(list))

toast("Đã lưu game")

}

/* QUICK VIEW */

function openQuick(id){

quickTitle.innerText=games[id]
quickImg.src="https://picsum.photos/400/30"+id

quickModal.classList.remove("hidden")

}

function closeQuick(){
quickModal.classList.add("hidden")
}

/* COPY */

function copyLink(){

navigator.clipboard.writeText(location.href)

toast("Đã copy link")

}

/* TOAST */

function toast(msg){

let t=document.getElementById("toast")

t.innerText=msg

t.style.display="block"

setTimeout(()=>t.style.display="none",3000)

}

/* AUTH */

function openAuth(){
authModal.classList.remove("hidden")
}

/* AUDIO */

function toggleAudio(){

let a=document.getElementById("bgm")

if(a.paused){
a.play()
}else{
a.pause()
}

}

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("bgCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

ctx.fillStyle="#bc13fe"
ctx.fillRect(p.x,p.y,2,2)

})

requestAnimationFrame(animate)

}

animate()

/* SCROLL REVEAL */

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("active")
}
})
})

document.querySelectorAll(".reveal").forEach(el=>{
observer.observe(el)
})

</script>

</body>
</html>
