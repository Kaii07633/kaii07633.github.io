<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaii VN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,0.7);
z-index:100;
}

.logo{
font-family:'Orbitron',sans-serif;
color:#00ffd5;
font-size:20px;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
}

.menu-btn{
display:none;
font-size:22px;
cursor:pointer;
}

/* MOBILE MENU */

.mobile{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#111;
padding:40px 20px;
transition:0.3s;
}

.mobile a{
display:block;
margin-bottom:15px;
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.9)),
url("https://c10.patreonusercontent.com/4/patreon-media/p/post/150765348/ad9f53cd292849189563a7cdcab6d7ba/eyJ3IjoxMDgwfQ%3D%3D/1.png?token-time=1774828800")
center/cover no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-family:'Orbitron',sans-serif;
font-size:55px;
text-shadow:0 0 20px #00ffd5;
}

.btn{
margin-top:20px;
display:inline-block;
padding:15px 35px;
background:#00ffd5;
color:black;
border-radius:8px;
font-weight:bold;
text-decoration:none;
}

/* NEWS */

.news{
padding:80px 20px;
text-align:center;
}

.news-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.news-box{
background:#111;
padding:20px;
border-radius:10px;
width:260px;
}

/* SEARCH */

.search{
padding:60px 20px;
text-align:center;
}

.search input{
padding:10px;
width:220px;
}

.search button{
padding:10px;
background:#00ffd5;
border:none;
}

/* GAME LIST */

.games{
padding:60px 20px;
}

.game-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.game{
background:#111;
padding:20px;
border-radius:10px;
width:200px;
}

/* GALLERY SLIDER */

.gallery{
padding:60px 20px;
text-align:center;
}

.slider{
display:flex;
overflow:auto;
gap:20px;
}

.slider img{
width:300px;
border-radius:10px;
}

/* LOGIN */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.box{
background:#111;
padding:30px;
border-radius:10px;
width:280px;
}

.box input{
width:100%;
padding:10px;
margin-top:10px;
}

.box button{
margin-top:10px;
width:100%;
padding:10px;
background:#00ffd5;
border:none;
}

footer{
padding:40px;
text-align:center;
background:#000;
margin-top:80px;
}

@media(max-width:768px){

.menu{
display:none;
}

.menu-btn{
display:block;
}

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">KAII VN</div>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#games">Game</a>
<a href="#gallery">Ảnh</a>
<a onclick="openLogin()">Tài khoản</a>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</div>

<div class="mobile" id="mobile">
<a href="#">Trang chủ</a>
<a href="#games">Game</a>
<a href="#gallery">Ảnh</a>
<a onclick="openLogin()">Tài khoản</a>
</div>

<div class="hero">

<div>

<h1>Kaii Visual Novel</h1>

<a class="btn" href="#games">Tải ngay</a>

</div>

</div>

<section class="news">

<h2>Tin tức</h2>

<div class="news-grid">

<div class="news-box">Update 1.0 phát hành</div>

<div class="news-box">Thêm nhân vật mới</div>

<div class="news-box">Story mới sắp ra</div>

</div>

</section>

<section class="search">

<h2>Tìm thể loại game</h2>

<input id="searchInput" placeholder="Visual Novel">
<button onclick="searchGame()">Tìm</button>

</section>

<section class="games" id="games">

<h2>Danh sách game</h2>

<div class="game-grid" id="gameList">

<div class="game" data-type="visual">Kaii VN</div>
<div class="game" data-type="horror">Night Story</div>
<div class="game" data-type="romance">Love Route</div>

</div>

</section>

<section class="gallery" id="gallery">

<h2>Hình ảnh game</h2>

<div class="slider">

<img src="https://c10.patreonusercontent.com/4/patreon-media/p/post/134027967/e8a22d1f218a46158ed74b9e2461b65c/1.png">

<img src="https://c10.patreonusercontent.com/4/patreon-media/p/post/68936209/67dde7ae097148ecafb8b399af1611d9/1.png">

</div>

</section>

<div class="popup" id="login">

<div class="box">

<h3>Đăng ký / Đăng nhập</h3>

<input id="user" placeholder="Tài khoản">
<input id="pass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>

</div>

</div>

<footer>

© 2026 Kaii VN

</footer>

<script>

function toggleMenu(){

let m=document.getElementById("mobile");

if(m.style.right==="0px"){

m.style.right="-250px";

}else{

m.style.right="0px";

}

}

function openLogin(){

document.getElementById("login").style.display="flex";

}

function register(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

localStorage.setItem("user",u);
localStorage.setItem("pass",p);

alert("Đăng ký xong");

}

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(localStorage.getItem("user")==u && localStorage.getItem("pass")==p){

alert("Đăng nhập thành công");

}else{

alert("Sai tài khoản");

}

}

function searchGame(){

let q=document.getElementById("searchInput").value.toLowerCase();

let games=document.querySelectorAll(".game");

games.forEach(g=>{

if(g.dataset.type.includes(q)){

g.style.display="block";

}else{

g.style.display="none";

}

});

}

</script>

</body>
</html>
