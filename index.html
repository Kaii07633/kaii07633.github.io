<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaii VN</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,0.8);
z-index:100;
}

.logo{
font-weight:800;
font-size:20px;
color:#00ffd5;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

.menu-btn{
display:none;
font-size:22px;
cursor:pointer;
}

/* MOBILE */

.mobile{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#111;
padding:40px 20px;
transition:0.3s;
}

.mobile a{
display:block;
margin-bottom:15px;
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1500&q=80")
center/cover no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:60px;
}

.btn{
margin-top:20px;
display:inline-block;
padding:15px 35px;
background:#00ffd5;
color:black;
border-radius:8px;
font-weight:bold;
text-decoration:none;
}

/* NEWS */

.news{
padding:80px 20px;
text-align:center;
}

.news-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.news-box{
background:#111;
padding:20px;
border-radius:10px;
width:260px;
}

/* SEARCH */

.search{
padding:60px 20px;
text-align:center;
}

.search input{
padding:10px;
width:220px;
border:none;
}

.search button{
padding:10px;
background:#00ffd5;
border:none;
}

/* GAME LIST */

.games{
padding:60px 20px;
}

.game-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.game{
background:#111;
padding:20px;
border-radius:10px;
width:200px;
}

/* GALLERY */

.gallery{
padding:60px 20px;
text-align:center;
}

.slider{
display:flex;
overflow:auto;
gap:20px;
}

.slider img{
width:320px;
border-radius:10px;
}

/* LOGIN */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.box{
background:#111;
padding:30px;
border-radius:10px;
width:280px;
}

.box input{
width:100%;
padding:10px;
margin-top:10px;
}

.box button{
margin-top:10px;
width:100%;
padding:10px;
background:#00ffd5;
border:none;
}

footer{
padding:40px;
text-align:center;
background:#000;
margin-top:80px;
}

@media(max-width:768px){

.menu{
display:none;
}

.menu-btn{
display:block;
}

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">KAII VN</div>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#games">Game</a>
<a href="#gallery">Ảnh</a>
<a onclick="openLogin()">Tài khoản</a>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</div>

<div class="mobile" id="mobile">
<a href="#">Trang chủ</a>
<a href="#games">Game</a>
<a href="#gallery">Ảnh</a>
<a onclick="openLogin()">Tài khoản</a>
</div>

<div class="hero">

<div>

<h1>Kaii Visual Novel</h1>

<a class="btn" href="#games">Tải ngay</a>

</div>

</div>

<section class="news">

<h2>Tin tức</h2>

<div class="news-grid">

<div class="news-box">Update 1.0 phát hành</div>
<div class="news-box">Thêm nhân vật mới</div>
<div class="news-box">Story mới sắp ra</div>

</div>

</section>

<section class="search">

<h2>Tìm thể loại game</h2>

<input id="searchInput" placeholder="visual">
<button onclick="searchGame()">Tìm</button>

</section>

<section class="games" id="games">

<h2>Danh sách game</h2>

<div class="game-grid" id="gameList">

<div class="game" data-type="visual">Kaii VN</div>
<div class="game" data-type="horror">Night Story</div>
<div class="game" data-type="romance">Love Route</div>

</div>

</section>

<section class="gallery" id="gallery">

<h2>Hình ảnh game</h2>

<div class="slider">

<img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?auto=format&fit=crop&w=1200&q=80">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80">

</div>

</section>

<div class="popup" id="login">

<div class="box">

<h3>Đăng ký / Đăng nhập</h3>

<input id="user" placeholder="Tài khoản">
<input id="pass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>

</div>

</div>

<footer>

© 2026 Kaii VN

</footer>

<script>

function toggleMenu(){
let m=document.getElementById("mobile");
if(m.style.right==="0px"){m.style.right="-250px";}else{m.style.right="0px";}
}

function openLogin(){
document.getElementById("login").style.display="flex";
}

function register(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;
localStorage.setItem("user",u);
localStorage.setItem("pass",p);
alert("Đăng ký xong");
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;
if(localStorage.getItem("user")==u && localStorage.getItem("pass")==p){
alert("Đăng nhập thành công");
}else{
alert("Sai tài khoản");
}
}

function searchGame(){
let q=document.getElementById("searchInput").value.toLowerCase();
let games=document.querySelectorAll(".game");
games.forEach(g=>{
if(g.dataset.type.includes(q)){g.style.display="block";}
else{g.style.display="none";}
});
}

</script>

</body>
</html>
