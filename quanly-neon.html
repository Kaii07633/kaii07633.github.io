<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CỔNG XÁC THỰC ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(20,20,20,0.9); border: 1px solid #bc13fe; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); }
    </style>
</head>
<body class="p-4 flex justify-center items-center min-h-screen">

    <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-black text-[#bc13fe] mb-2">ĐĂNG NHẬP BOSS</h2>
        <p class="text-xs text-gray-500 mb-8">Xác thực để mở khóa index.html</p>
        
        <input id="adminU" placeholder="Tên định danh (Admin)" class="w-full bg-black border border-white/20 p-4 rounded-xl mb-4 text-white focus:border-[#bc13fe] outline-none">
        <input id="adminP" type="password" placeholder="Mật mã (Admin123)" class="w-full bg-black border border-white/20 p-4 rounded-xl mb-8 text-white focus:border-[#bc13fe] outline-none">
        
        <button onclick="login()" class="w-full bg-[#bc13fe] text-white py-4 rounded-xl font-black hover:shadow-[0_0_20px_#bc13fe] transition">XÁC THỰC & CHUYỂN HƯỚNG</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('adminU').value;
            const p = document.getElementById('adminP').value;
            
            if(u === 'Admin' && p === 'Admin123') { 
                // 1. Cấp quyền Admin vào bộ nhớ trình duyệt
                localStorage.setItem('user', 'Admin');
                localStorage.setItem('role', 'admin');
                
                alert('Xác thực thành công! Đang bế đại ca về Trang chủ...');
                
                // 2. Chuyển thẳng về index.html
                window.location.href = 'index.html';
            } else { 
                alert('Sai mật mã! Cút!'); 
            }
        }
    </script>
</body>
</html>
